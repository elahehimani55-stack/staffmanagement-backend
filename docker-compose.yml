version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: staff_db
    environment:
      POSTGRES_DB: staff_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: staff_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: